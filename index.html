<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算术练习纸 · 目录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Noto+Serif+SC:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --paper: #f4ede0;
      --ink: #1a2233;
      --ink-soft: #4a5466;
      --accent: #7a3b2e;
      --rule: #d8cdb6;
      --card-bg: #fffdf7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif SC", "Fraunces", serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 20% -10%, #efe6d4, transparent 60%),
        var(--paper);
      min-height: 100vh;
      padding: 64px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .header { margin-bottom: 48px; text-align: center; }
    .brand-mark {
      font-family: "IBM Plex Mono", monospace;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -1px;
      font-size: 1rem;
      margin-bottom: 12px;
      display: block;
    }
    .title {
      font-family: "Fraunces", "Noto Serif SC", serif;
      font-weight: 700;
      font-size: 2.6rem;
      letter-spacing: 1px;
      font-variation-settings: "opsz" 144;
      margin-bottom: 10px;
    }
    .subtitle { color: var(--ink-soft); font-size: 0.95rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 24px 22px;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent 70%);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px -16px rgba(40, 30, 10, 0.4);
      border-color: var(--accent);
    }
    .card-tag {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.74rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }
    .card-title {
      font-family: "Fraunces", "Noto Serif SC", serif;
      font-weight: 600;
      font-size: 1.35rem;
      margin-bottom: 6px;
    }
    .card-desc { color: var(--ink-soft); font-size: 0.86rem; line-height: 1.55; }
    .card-arrow {
      margin-top: 14px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      color: var(--ink-soft);
    }
    .empty { text-align: center; color: var(--ink-soft); padding: 60px 0; font-size: 0.95rem; }
    .foot {
      margin-top: 56px;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.76rem;
      color: var(--ink-soft);
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <span class="brand-mark">＋－</span>
      <h1 class="title">算术练习纸</h1>
      <p class="subtitle">点击下方任一练习集开始口算与竖式训练</p>
    </header>
    <main class="grid" id="list" aria-label="练习集列表"></main>
    <footer class="foot">
      <span>算术练习纸目录 · 每次打开自动生成新题目</span>
    </footer>
  </div>
  <script>
    /* 练习集配置：新增只需在数组里追加一项即可 */
    const sets = [
      { tag: "test1", title: "100 以内加减法", desc: "40 道口算 + 8 道竖式计算，进位/退位各 ≤2 题", path: "test1/" }
      // { tag: "test2", title: "乘法口诀", desc: "九九乘法表练习", path: "test2/" }
    ];
    function render() {
      const list = document.getElementById("list");
      if (!sets.length) { list.innerHTML = '<div class="empty">暂无练习集</div>'; return; }
      list.innerHTML = sets.map(function (s) {
        return '<a class="card" href="' + s.path + '">' +
          '<span class="card-tag">' + s.tag + '</span>' +
          '<div class="card-title">' + s.title + '</div>' +
          '<div class="card-desc">' + s.desc + '</div>' +
          '<div class="card-arrow">开始练习 →</div>' +
        '</a>';
      }).join("");
    }
    render();
  </script>
</body>
</html>
